name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチで最新の commit のみ走らせて節約
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Lint / Typecheck / Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit / integration tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # 本番ドメインは Vercel 側で設定。CI では空でビルドだけ通す。
          NEXT_PUBLIC_SITE_URL: ""

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        run: pnpm test:e2e
        env:
          # 認証ゲートを素通り (Playwright config 側でも空文字を入れているが念のため)
          BASIC_AUTH_USER: ""
          BASIC_AUTH_PASSWORD: ""
          # GitHub Search API のレート制限緩和。secrets.GITHUB_TOKEN は repo 単位で
          # 自動付与されるため別途設定不要。
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
